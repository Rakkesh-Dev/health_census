<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Analysis Data</title>
    <link rel="stylesheet" href="./health_analysis.css">
</head>
<body>
    <nav>
        <h2>Health Analysis</h2>
        <ul>
            <li>
                <a href="index.html" id="home">Home</a>
            </li>
            <li>
                <a href="health_contact.html" id="contact">Contact Us</a>
            </li>
            <li>
                <input type="text" id="conditionInput" placeholder="Enter health condition">
            </li>
            <li>
                <button id="btnSearch">Search</button>
            </li>
        </ul>
    </nav>

    <div class="container">
        <div class="analysisForm">
            <h1>Healthcare Data Analysis</h1>
        </div>

        <div>
            <label for="name">Name: </label>
            <input type="text" id="name">
        </div>

        <div>
            <label>Gender:</label>
            <label class="radio-container">
                <input type="radio" name="gender" value="Male"> Male
            </label>
            <label class="radio-container">
                <input type="radio" name="gender" value="Female"> Female
            </label>
        </div>

        <div>
            <label for="age">Age: </label>
            <input type="number" id="age">
        </div>

        <div>
            <label for="condition">Condition: </label>
            <select id="condition">
                <option value="">Select Condition</option>
                <option value="Diabetes">Diabetes</option>
                <option value="Thyroid">Thyroid</option>
                <option value="High Blood Pressure">High Blood Pressure</option>
            </select>
        </div>

        <button id="addPatient">Add Patient</button>
        <h2>Analysis Report</h2>
        <div id="report"></div>
        <div class="searchCondition">
            <div id="result"></div>
        </div>
    </div>

    <script src="./health_analysis.js"></script>
</body>
</html>
